apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dclaw-contract.name" . }}
  labels:
    app.kubernetes.io/name: {{ include "dclaw-contract.name" . }}
spec:
  rules:
    - host: dclaw-contract.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "dclaw-contract.name" . }}
                port:
                  number: {{ .Values.frontend.service.port }}
